<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>專注力追蹤挑戰</title>
<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"></script>

<style>
body{
    margin:0;
    background:#050a10;
    color:white;
    font-family:"Microsoft JhengHei",sans-serif;
    overflow:hidden;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(5,16,30,0.92);
    z-index:1000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.big-grade{
    font-size:5rem;
    font-weight:bold;
    text-shadow:0 0 25px #00d2ff;
}

.animal{
    font-size:3rem;
    margin-top:10px;
}

.calib-point{
    width:40px;
    height:40px;
    background:#ff4757;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    border:3px solid white;
    z-index:1100;
    display:none;
}

.target{
    width:60px;
    height:60px;
    background:radial-gradient(circle,#fff,#00d2ff);
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    box-shadow:0 0 40px #00d2ff;
}

#score-board{
    position:fixed;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:2.2rem;
    display:none;
}

button{
    padding:15px 35px;
    font-size:1.2rem;
    background:#00d2ff;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="overlay">
    <h1 id="main-title">專注力校準測試</h1>
    <p id="sub-msg">請先把臉對準鏡頭，再點擊開始</p>
    <button id="startBtn" onclick="prepareCalibration()">開始測試</button>
</div>

<div id="calib-pts">
    <div class="calib-point" style="top:15%; left:15%" onclick="calibrate(this)"></div>
    <div class="calib-point" style="top:15%; left:85%" onclick="calibrate(this)"></div>
    <div class="calib-point" style="top:50%; left:50%" onclick="calibrate(this)"></div>
    <div class="calib-point" style="top:85%; left:15%" onclick="calibrate(this)"></div>
    <div class="calib-point" style="top:85%; left:85%" onclick="calibrate(this)"></div>
</div>

<div class="target" id="mainTarget"></div>

<canvas id="heatmapThumb"
style="position:absolute;right:8%;top:50%;transform:translateY(-50%);
width:220px;height:160px;border-radius:12px;
box-shadow:0 0 20px rgba(255,80,80,.4);display:none;z-index:2100;">
</canvas>

<div id="score-board">
    專注能量: <span id="scoreText">100</span>%
</div>

<script>
let score=100;
let calibCount=0;
let isGameRunning=false;
let gazeTrail=[];
let smoothX=0,smoothY=0;

// ⭐ 模式切換（你之後可改）
const TARGET_MODE="center"; // center / random
const STRICTNESS=1.0;

webgazer.showVideoPreview(true);
webgazer.showPredictionPoints(true);

window.addEventListener("load",()=>{
    webgazer
      .setRegression('ridge')
      .setGazeListener((data)=>{
        if(!data) return;
        smoothX=data.x;
        smoothY=data.y;
        if(isGameRunning) gazeTrail.push({x:smoothX,y:smoothY});
      })
      .begin();

    webgazer.showVideoPreview(true);
    webgazer.showPredictionPoints(true);
});

// ⭐⭐⭐ 進入校正
function prepareCalibration(){
    resetAll();
    document.getElementById('startBtn').style.display='none';
    document.querySelectorAll('.calib-point').forEach(p=>{
        p.style.display='block';
    });
}

// ⭐⭐⭐ 校正點擊
function calibrate(el){
    if(el.dataset.done==="1") return;

    el.dataset.done="1";
    el.style.background="#2ed573";
    calibCount++;

    setTimeout(()=>el.style.display="none",200);

    if(calibCount>=5){
        startGame();
    }
}

// ⭐⭐⭐ 開始遊戲
function startGame(){
    isGameRunning=true;
    score=100;
    gazeTrail=[];

    // 遊戲中隱藏鏡頭
    webgazer.showVideoPreview(false);
    webgazer.showPredictionPoints(true);

    document.getElementById("overlay").style.display="none";
    document.getElementById("score-board").style.display="block";
    document.getElementById("mainTarget").style.display="block";

    if(TARGET_MODE==="random"){
        moveTargetLoop(); // ⭐ 已保留舊功能
    }

    startFocusScoring();
}

// ⭐⭐⭐ 原版隨機（保留）
function moveTargetLoop(){
    const target=document.getElementById("mainTarget");
    function move(){
        if(!isGameRunning) return;
        target.style.left=(10+Math.random()*80)+"%";
        target.style.top=(15+Math.random()*70)+"%";
        setTimeout(move,1800);
    }
    move();
}

// ⭐⭐⭐ 評分
function startFocusScoring(){
    const target=document.getElementById("mainTarget");

    const timer=setInterval(()=>{
        if(!isGameRunning){
            clearInterval(timer);
            return;
        }

        const rect=target.getBoundingClientRect();
        const cx=rect.left+rect.width/2;
        const cy=rect.top+rect.height/2;

        const dx=smoothX-cx;
        const dy=smoothY-cy;
        const dist=Math.sqrt(dx*dx+dy*dy);

        if(dist>120){
            score-=0.3*STRICTNESS;
        }

        if(score<0) score=0;
        document.getElementById("scoreText").innerText=Math.floor(score);

        if(score<=0 || gazeTrail.length>500){
            finishGame();
        }

    },120);
}

// ⭐⭐⭐ 結束
function finishGame(){
    isGameRunning=false;

    drawHeatmapThumb();

    const rank=getRank(score);

    document.getElementById('overlay').style.display='flex';
    document.getElementById('main-title').innerHTML=
        `<div class="big-grade">${rank.grade}</div>`;

    document.getElementById('sub-msg').innerHTML=
        `最終專注度：${Math.floor(score)}%<br>${rank.msg}
         <div class="animal">${rank.animal}</div>`;

    document.getElementById('startBtn').style.display='inline-block';
    document.getElementById('startBtn').innerText='再玩一次';

    // 回到可對臉狀態
    webgazer.showVideoPreview(true);
    webgazer.showPredictionPoints(true);
}

// ⭐⭐⭐ Reset
function resetAll(){
    score=100;
    calibCount=0;
    isGameRunning=false;
    gazeTrail=[];

    document.querySelectorAll('.calib-point').forEach(p=>{
        p.dataset.done="0";
        p.style.display="none";
        p.style.background="#ff4757";
    });

    document.getElementById("heatmapThumb").style.display="none";
    document.getElementById("scoreText").innerText="100";
}

// ⭐⭐⭐ 等級
function getRank(percent){
    if(percent>=90) return {grade:"S",animal:"🦅 老鷹",msg:"你的專注力像老鷹一樣銳利！"};
    if(percent>=80) return {grade:"A",animal:"🐆 獵豹",msg:"你的專注力非常敏捷！"};
    if(percent>=70) return {grade:"B",animal:"🐱 貓咪",msg:"你的專注力穩定不錯！"};
    if(percent>=60) return {grade:"C",animal:"🐢 樹懶",msg:"你的專注力偏慢，需要練習！"};
    return {grade:"D",animal:"🐠 金魚",msg:"注意力容易飄走喔！"};
}

// ⭐⭐⭐ 熱點
function drawHeatmapThumb(){
    const canvas=document.getElementById("heatmapThumb");
    const ctx=canvas.getContext("2d");
    canvas.width=220;
    canvas.height=160;
    ctx.clearRect(0,0,220,160);

    gazeTrail.forEach(p=>{
        const x=p.x/window.innerWidth*220;
        const y=p.y/window.innerHeight*160;
        ctx.fillStyle="rgba(255,80,80,0.25)";
        ctx.beginPath();
        ctx.arc(x,y,6,0,Math.PI*2);
        ctx.fill();
    });

    canvas.style.display="block";
}
</script>
</body>
</html>
